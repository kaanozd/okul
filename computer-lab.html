<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Computer Lab — Our School</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:opsz,wght@9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: #dbeeff;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem 1.5rem;
}
.card {
  background: #fff;
  border-radius: 24px;
  padding: 2.5rem 2rem;
  max-width: 420px;
  width: 100%;
  box-shadow: 0 8px 48px rgba(0,0,0,0.08);
  text-align: center;
}
.icon {
  font-size: 52px;
  margin-bottom: 1.2rem;
  display: block;
}
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  padding: 5px 14px;
  border-radius: 99px;
  background: #dbeeff;
  color: #185FA5;
  margin-bottom: 14px;
}
h1 {
  font-family: 'DM Serif Display', Georgia, serif;
  font-size: 2.2rem;
  font-weight: 400;
  color: #185FA5;
  margin-bottom: 16px;
  line-height: 1.15;
}
p {
  font-size: 17px;
  line-height: 1.8;
  color: #555;
}
.divider {
  width: 40px;
  height: 3px;
  background: #185FA5;
  border-radius: 99px;
  margin: 1.4rem auto;
  opacity: 0.3;
}
.school-name {
  font-size: 12px;
  color: #bbb;
  margin-top: 1.6rem;
  letter-spacing: 0.06em;
}
</style>
</head>
<body>
<div class="card">
  <span class="icon">💻</span>
  <span class="badge">COMPUTER LAB</span>
  <h1>Computer Lab</h1>
  <div class="divider"></div>
  <p>This is the computer lab. Students use computers and learn technology here.</p>
  <p class="school-name">OUR SCHOOL</p>
</div>
</body>
</html>
